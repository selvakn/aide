# Coverage thresholds enforced by vladopajic/go-test-coverage.
# Two tiers: 60% overall floor, 80% for security-critical packages.

profile: coverage.out

threshold:
  file:    0
  package: 60
  total:   60

override:
  # seccomp_linux.go is dominated by syscall error returns (prctl,
  # memfd_create, write, seek) that cannot be exercised without dependency
  # injection. Happy paths plus filter-shape validation are tested in
  # seccomp_linux_test.go; the unreachable branches cap coverage near 70%.
  - threshold: 70
    path: internal/sandbox/seccomp_linux.go
  - threshold: 80
    path: pkg/seatbelt
  - threshold: 80
    path: internal/sandbox
  - threshold: 80
    path: internal/secrets
  - threshold: 80
    path: internal/config
  - threshold: 50
    path: internal/ui

exclude:
  paths:
    - cmd/aide
    - /mocks/
    # Linux-only code requiring Landlock kernel — untestable on macOS/CI
    - internal/sandbox/linux.go
    # macOS Seatbelt sandbox — requires real sandbox-exec, untestable in CI
    - internal/sandbox/sandbox.go
    # Interactive editor launch — requires $EDITOR and TTY
    - internal/secrets/editor.go
