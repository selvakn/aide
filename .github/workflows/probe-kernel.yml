name: Probe Kernel Versions

on:
  push:
    branches: ["probe-kernel-versions"]
  workflow_dispatch:

jobs:
  probe:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    name: Kernel on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: probe/go.mod
          cache-dependency-path: probe/go.sum

      - name: Print kernel info
        run: |
          echo "=== Runner: ${{ matrix.os }} ==="
          uname -r
          uname -a

      - name: Landlock status (sandbox.DetectKernelCapabilities)
        working-directory: probe
        run: go run .
