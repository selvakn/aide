name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Install bubblewrap
        run: sudo apt-get update -q && sudo apt-get install -y bubblewrap

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Check coverage thresholds
        uses: vladopajic/go-test-coverage@v2
        with:
          config: .testcoverage.yml

      - name: Check generated mocks are up to date
        run: |
          go install go.uber.org/mock/mockgen@latest
          go generate ./...
          if ! git diff --quiet -- '*/mocks/'; then
            echo "::error::Generated mocks are out of date. Run 'make generate' and commit."
            git diff -- '*/mocks/'
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  sast-gosec:
    name: Security Scan (gosec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Install tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install github.com/mikefarah/yq/v4@latest

      - name: Run gosec
        run: |
          EXCLUDE=$(yq -r '.exclude | keys | join(",")' .gosec.yaml)
          gosec -exclude="$EXCLUDE" -fmt sarif -out gosec-results.sarif ./... || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build
        run: make build

  linux-sandbox-integration:
    name: Linux Sandbox Integration (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 24.04 — kernel ≥ 6.7, Landlock ABI ≥ 4, primary tier
          - os: ubuntu-24.04
            runner: ubuntu-24.04
            expected_tier: primary
          # Ubuntu 22.04 — kernel 5.15, Landlock ABI 1–2, degraded for port rules
          - os: ubuntu-22.04
            runner: ubuntu-22.04
            expected_tier: primary-or-degraded
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Install bubblewrap
        run: sudo apt-get update -q && sudo apt-get install -y bubblewrap

      - name: Confirm Landlock LSM presence
        run: cat /sys/kernel/security/lsm | tr ',' '\n' | grep landlock || echo "landlock not in LSM list"

      - name: Run unit tests (Linux sandbox)
        run: go test -race ./internal/sandbox/ -v -run "TestDetect|TestCompute|TestPlatform|TestDeriveGrantedPathSet|TestDerivePortPolicy"

      - name: Run integration tests (Linux sandbox)
        # Individual tests call t.Skip() when bwrap cannot create namespaces
        # (e.g. unprivileged container); a non-zero exit indicates a real
        # regression and must fail the job.
        run: |
          go test -tags integration ./internal/sandbox/ -v \
            -run "TestLinuxIntegration" \
            -timeout 60s
